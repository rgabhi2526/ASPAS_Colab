<script type="text/babel">
const { useState, useEffect, useRef } = React;

  { id:7, num:'SP-SUS-001', name:'Shock Absorber – Front',       qty:15, threshold:7,  price:1800,  size:'LARGE',  rack:'Rack #4 · East B',  vendors:['Valeo India'] },

  { id:10,num:'SP-COL-001', name:'Coolant Hose Set',             qty:20, threshold:10, price:650,   size:'SMALL',  rack:'Rack #5 · South A', vendors:['Valeo India'] },

const VENDORS = [
  { id:1, name:'Bosch Auto Parts',   address:'123 Industrial Area, Berlin, Germany', contact:'+49-30-12345',      email:'orders@bosch-auto.com', parts:3 },
  { id:2, name:'Denso Corporation',  address:'1-1 Showa-cho, Kariya, Aichi, Japan',  contact:'+81-566-25-5511',   email:'supply@denso.com',        parts:2 },
  { id:3, name:'Valeo India Pvt Ltd',address:'Plot 56, SIPCOT IT Park, Chennai',      contact:'+91-44-66789000',   email:'vendor@valeo.in',          parts:3 },
  { id:4, name:'Mann+Hummel',        address:'45 Filter Street, Ludwigsburg, Germany',contact:'+49-7141-980',      email:'parts@mann-hummel.com',    parts:2 },
  { id:5, name:'Brembo SpA',         address:'Via Brembo 25, Bergamo, Italy',          contact:'+39-035-605111',    email:'orders@brembo.it',         parts:2 },
];

const ORDERS = [
  { id:4201, date:'2026-04-18', vendor:'Brembo SpA',    items:2, total:3300,  status:'Dispatched' },
  { id:4202, date:'2026-04-18', vendor:'Bosch',         items:3, total:11200, status:'Pending' },

const SALES = [
  { id:'S-0891', date:'2026-04-19', part:'SP-BRK-001', partName:'Brake Pad – Front', qty:5, total:2250 },
  { id:'S-0892', date:'2026-04-19', part:'SP-FLT-001', partName:'Oil Filter',         qty:10,total:1800 },
  { id:'S-0893', date:'2026-04-19', part:'SP-ENG-001', partName:'Spark Plug',          qty:20,total:6400 },
  { id:'S-0890', date:'2026-04-18', part:'SP-BRK-002', partName:'Brake Disc – Front', qty:3, total:3600 },
  { id:'S-0889', date:'2026-04-18', part:'SP-CLT-001', partName:'Clutch Plate Kit',   qty:2, total:6400 },
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function stockStatus(p) {
  if (p.qty === 0) return 'critical';
  if (p.qty < p.threshold) return 'low';
  return 'ok';
}
function Icon({ name, size=16, color, style }) {
  const ref = useRef();
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const icon = lucide.createElement(lucide[name.replace(/-([a-z])/g, (_,c)=>c.toUpperCase())]);
      if (icon) {
        icon.setAttribute('width', size);
        icon.setAttribute('height', size);
        if (color) icon.setAttribute('stroke', color);
        ref.current.appendChild(icon);
      }
    }
  }, [name, size, color]);
  return <span ref={ref} style={{ display:'inline-flex', alignItems:'center', ...style }} />;
}

function Badge({ status }) {
  const map = {
    ok:       { bg:'#F0FDF4', color:'#15803D', label:'In Stock' },
    low:      { bg:'#FFFBEB', color:'#B45309', label:'Low Stock' },
    critical: { bg:'#FFF1F2', color:'#DC2626', label:'Critical' },
  };
  const s = map[status] || map.ok;
  return <span style={{ display:'inline-block', background:s.bg, color:s.color, fontSize:10, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', padding:'2px 7px', borderRadius:4 }}>{s.label}</span>;
}
function OrderBadge({ status }) {
  const map = { Pending:{ bg:'#FFFBEB',color:'#B45309' }, Dispatched:{ bg:'#EFF6FF',color:'#1D4ED8' }, Received:{ bg:'#F0FDF4',color:'#15803D' } };
  const s = map[status] || map.Pending;
  return <span style={{ background:s.bg, color:s.color, fontSize:10, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', padding:'2px 7px', borderRadius:4 }}>{status}</span>;
}
function fmt(n) { return '₹' + n.toLocaleString('en-IN'); }

// ── Sidebar ───────────────────────────────────────────────────────────────────
const NAV = [
  { id:'dashboard', label:'Dashboard',  icon:'LayoutDashboard' },
  { id:'inventory', label:'Inventory',  icon:'Package' },
  { id:'orders',    label:'Orders',     icon:'ClipboardList' },
  { id:'sales',     label:'Sales',      icon:'ShoppingCart' },
  { id:'vendors',   label:'Vendors',    icon:'Building2' },
  { id:'reports',   label:'Reports',    icon:'BarChart2' },
];

function Sidebar({ active, setActive }) {

    <div style={{ width:220, minWidth:220, background:'var(--navy-900)', display:'flex', flexDirection:'column', height:'100vh', position:'sticky', top:0 }}>

        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:32, height:32, background:'var(--amber)', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Icon name="Settings2" size={16} color="#0F1C2E" />
          </div>
          <div>
            <div style={{ color:'#fff', fontWeight:700, fontSize:15, letterSpacing:'-0.01em' }}>ASPAS</div>
            <div style={{ color:'rgba(255,255,255,0.4)', fontSize:10, letterSpacing:'0.08em', textTransform:'uppercase', marginTop:1 }}>Parts System</div>
          </div>
        </div>
      </div>
      {/* Nav */}
      <nav style={{ flex:1, padding:'12px 10px' }}>
        {NAV.map(n => {
          const isActive = active === n.id;
          return (
            <button key={n.id} onClick={() => setActive(n.id)} style={{
              display:'flex', alignItems:'center', gap:10, width:'100%',
              padding:'9px 12px', borderRadius:6, border:'none',
              background: isActive ? 'rgba(245,158,11,0.15)' : 'transparent',
              color: isActive ? 'var(--amber)' : 'rgba(255,255,255,0.6)',
              fontFamily:'DM Sans', fontSize:13, fontWeight: isActive ? 600 : 400,
              cursor:'pointer', textAlign:'left', marginBottom:2,
              borderLeft: isActive ? '3px solid var(--amber)' : '3px solid transparent',
              transition:'all 150ms ease',
            }}>
              <Icon name={n.icon} size={15} color={isActive ? '#F59E0B' : 'rgba(255,255,255,0.5)'} />
              {n.label}
            </button>
          );
        })}
      </nav>
      {/* Footer */}
      <div style={{ padding:'14px 16px', borderTop:'1px solid rgba(255,255,255,0.07)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:28, height:28, background:'var(--navy-700)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Icon name="User" size={13} color="rgba(255,255,255,0.6)" />
          </div>
          <div>
            <div style={{ color:'rgba(255,255,255,0.85)', fontSize:12, fontWeight:500 }}>Store Manager</div>
            <div style={{ color:'rgba(255,255,255,0.35)', fontSize:11 }}>admin@aspas.in</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Top Bar ───────────────────────────────────────────────────────────────────
function TopBar({ title, subtitle, actions }) {
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'18px 28px', borderBottom:'1px solid var(--slate-200)', background:'#fff' }}>
      <div>
        <h1 style={{ fontSize:20, fontWeight:700, color:'var(--slate-900)', letterSpacing:'-0.01em' }}>{title}</h1>
        {subtitle && <p style={{ fontSize:13, color:'var(--slate-400)', marginTop:2 }}>{subtitle}</p>}
      </div>
      <div style={{ display:'flex', gap:8 }}>{actions}</div>
    </div>
  );
}

function Btn({ variant='primary', children, onClick, icon }) {
  const styles = {
    primary: { background:'var(--amber)', color:'#0F1C2E', border:'1px solid transparent' },
    secondary: { background:'#fff', color:'var(--slate-700)', border:'1px solid var(--slate-200)' },
    ghost: { background:'transparent', color:'var(--slate-500)', border:'1px solid transparent' },
  };
  return (
    <button onClick={onClick} style={{
      display:'inline-flex', alignItems:'center', gap:6,
      padding:'7px 14px', borderRadius:6, fontSize:13, fontWeight:500,
      fontFamily:'DM Sans', cursor:'pointer', transition:'all 150ms',
      ...styles[variant],
    }}>
      {icon && <Icon name={icon} size={14} />}
      {children}
    </button>
  );
}

// ── Dashboard Screen ──────────────────────────────────────────────────────────
function DashboardScreen({ setActive }) {
  const lowStock = PARTS.filter(p => stockStatus(p) !== 'ok');
  const todayRevenue = SALES.filter(s => s.date === '2026-04-19').reduce((a,s) => a+s.total, 0);
  const stats = [
    { label:'Total Parts', value:'248', sub:'across 5 racks', icon:'Package', color:'var(--navy-700)' },
    { label:"Today's Revenue", value: fmt(todayRevenue), sub:'+12.4% vs yesterday', icon:'IndianRupee', color:'#059669', badge:'up' },
    { label:'Low Stock Alerts', value: String(lowStock.length), sub:'Reorder recommended', icon:'AlertTriangle', color:'#B45309', badge:'warn' },
    { label:'Open Orders', value:'14', sub:'3 pending dispatch', icon:'ClipboardList', color:'var(--navy-500)' },
  ];

  return (
    <div style={{ flex:1, overflow:'auto' }}>
      <TopBar title="Dashboard" subtitle="Good morning — April 19, 2026" />
      <div style={{ padding:24 }}>
        {/* Stat cards */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:24 }}>
          {stats.map(s => (
            <div key={s.label} style={{ background:'#fff', border:'1px solid var(--slate-200)', borderRadius:8, padding:'16px 20px', boxShadow:'var(--shadow-card)' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
                <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.07em', textTransform:'uppercase', color:'var(--slate-400)' }}>{s.label}</div>
                <div style={{ width:30, height:30, borderRadius:6, background:'var(--slate-100)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <Icon name={s.icon} size={14} color={s.color} />
                </div>
              </div>
              <div style={{ fontFamily:'DM Mono', fontSize:26, fontWeight:700, color: s.badge==='warn' ? '#B45309' : 'var(--slate-900)', lineHeight:1.2 }}>{s.value}</div>
              <div style={{ fontSize:12, color:'var(--slate-400)', marginTop:4 }}>{s.sub}</div>
            </div>
          ))}
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 320px', gap:16 }}>
          {/* Low stock table */}
          <div style={{ background:'#fff', border:'1px solid var(--slate-200)', borderRadius:8, boxShadow:'var(--shadow-card)', overflow:'hidden' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 18px', borderBottom:'1px solid var(--slate-100)' }}>
              <div style={{ fontSize:14, fontWeight:600, color:'var(--slate-900)' }}>Low Stock Alerts</div>
              <Btn variant="ghost" onClick={() => setActive('inventory')}>View all</Btn>
            </div>
            <table style={{ width:'100%', borderCollapse:'collapse' }}>
              <thead>
                <tr style={{ background:'var(--slate-50)' }}>
                  {['Part No.','Part Name','Qty','Threshold','Status'].map(h =>
                    <th key={h} style={{ padding:'8px 14px', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--slate-400)', textAlign:'left', borderBottom:'1px solid var(--slate-100)' }}>{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {lowStock.map(p => (
                  <tr key={p.id}>
                    <td style={{ padding:'10px 14px', fontFamily:'DM Mono', fontSize:12, letterSpacing:'0.04em', color:'var(--slate-700)', borderBottom:'1px solid var(--slate-50)' }}>{p.num}</td>
                    <td style={{ padding:'10px 14px', fontSize:13, color:'var(--slate-700)', borderBottom:'1px solid var(--slate-50)' }}>{p.name}</td>
                    <td style={{ padding:'10px 14px', fontFamily:'DM Mono', fontSize:13, fontWeight:700, color: p.qty < p.threshold ? '#DC2626' : 'var(--slate-900)', borderBottom:'1px solid var(--slate-50)' }}>{p.qty}</td>
                    <td style={{ padding:'10px 14px', fontFamily:'DM Mono', fontSize:13, color:'var(--slate-500)', borderBottom:'1px solid var(--slate-50)' }}>{p.threshold}</td>
                    <td style={{ padding:'10px 14px', borderBottom:'1px solid var(--slate-50)' }}><Badge status={stockStatus(p)} /></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Recent sales */}
          <div style={{ background:'#fff', border:'1px solid var(--slate-200)', borderRadius:8, boxShadow:'var(--shadow-card)', overflow:'hidden' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 18px', borderBottom:'1px solid var(--slate-100)' }}>
              <div style={{ fontSize:14, fontWeight:600 }}>Recent Sales</div>
              <Btn variant="ghost" onClick={() => setActive('sales')}>View all</Btn>
            </div>
            {SALES.slice(0,4).map(s => (
              <div key={s.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 18px', borderBottom:'1px solid var(--slate-50)' }}>
                <div>
                  <div style={{ fontSize:13, fontWeight:500, color:'var(--slate-900)' }}>{s.partName}</div>
                  <div style={{ fontSize:11, color:'var(--slate-400)', fontFamily:'DM Mono', marginTop:2 }}>{s.id} · qty {s.qty}</div>
                </div>
                <div style={{ fontFamily:'DM Mono', fontSize:13, fontWeight:600, color:'#059669' }}>{fmt(s.total)}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Inventory Screen ──────────────────────────────────────────────────────────
function InventoryScreen() {
  const [query, setQuery] = useState('');
  const [filter, setFilter] = useState('all');
  const [showAdd, setShowAdd] = useState(false);

  const filtered = PARTS.filter(p => {
    const matchQ = !query || p.num.toLowerCase().includes(query.toLowerCase()) || p.name.toLowerCase().includes(query.toLowerCase());
    const matchF = filter === 'all' || (filter === 'low' && stockStatus(p) !== 'ok');
    return matchQ && matchF;
  });

  return (
    <div style={{ flex:1, overflow:'auto' }}>
      <TopBar
        title="Inventory"
        subtitle={`${PARTS.length} spare parts · ${PARTS.filter(p=>stockStatus(p)!=='ok').length} alerts`}
        actions={[
          <Btn key="jit" variant="secondary" icon="Activity">Recalculate JIT</Btn>,
          <Btn key="add" variant="primary" icon="Plus" onClick={() => setShowAdd(true)}>Add Part</Btn>
        ]}
      />
      <div style={{ padding:24 }}>
        {/* Filters row */}
        <div style={{ display:'flex', gap:10, marginBottom:16, alignItems:'center' }}>
          <div style={{ position:'relative', flex:1, maxWidth:320 }}>
            <span style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', display:'flex' }}>
              <Icon name="Search" size={14} color="var(--slate-400)" />
            </span>
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search part number or name…" style={{ width:'100%', padding:'8px 12px 8px 32px', fontSize:13, border:'1px solid var(--slate-200)', borderRadius:6, outline:'none', fontFamily:'DM Sans', color:'var(--slate-900)' }} />
          </div>
          {['all','low'].map(f => (
            <button key={f} onClick={()=>setFilter(f)} style={{
              padding:'7px 14px', borderRadius:6, fontSize:12, fontWeight:500, cursor:'pointer', fontFamily:'DM Sans',
              background: filter===f ? 'var(--amber-light)' : '#fff',
              color: filter===f ? 'var(--amber-dark)' : 'var(--slate-600)',
              border: `1px solid ${filter===f ? '#FDE68A' : 'var(--slate-200)'}`,
            }}>
              {f === 'all' ? 'All Parts' : 'Low Stock Only'}
            </button>
          ))}
        </div>

        {/* Table */}
        <div style={{ background:'#fff', border:'1px solid var(--slate-200)', borderRadius:8, boxShadow:'var(--shadow-card)', overflow:'hidden' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'var(--slate-50)' }}>
                {['Part No.','Part Name','Category','Qty','Threshold','Price','Location','Vendors','Status'].map(h =>
                  <th key={h} style={{ padding:'9px 14px', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--slate-400)', textAlign:'left', borderBottom:'1px solid var(--slate-200)', whiteSpace:'nowrap' }}>{h}</th>
                )}
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.id} style={{ cursor:'default' }} onMouseEnter={e=>e.currentTarget.style.background='#FFFBEB'} onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                  <td style={{ padding:'10px 14px', fontFamily:'DM Mono', fontSize:12, letterSpacing:'0.04em', color:'var(--slate-700)', borderBottom:'1px solid var(--slate-50)' }}>{p.num}</td>
                  <td style={{ padding:'10px 14px', fontSize:13, color:'var(--slate-900)', fontWeight:500, borderBottom:'1px solid var(--slate-50)' }}>{p.name}</td>
                  <td style={{ padding:'10px 14px', borderBottom:'1px solid var(--slate-50)' }}>
                    <span style={{ background:'var(--slate-100)', color:'var(--slate-600)', fontSize:10, fontWeight:600, padding:'2px 7px', borderRadius:4, letterSpacing:'0.06em', textTransform:'uppercase' }}>{p.size}</span>
                  </td>
                  <td style={{ padding:'10px 14px', fontFamily:'DM Mono', fontSize:13, fontWeight:700, color: stockStatus(p)==='ok' ? '#059669' : '#DC2626', borderBottom:'1px solid var(--slate-50)' }}>{p.qty}</td>
                  <td style={{ padding:'10px 14px', fontFamily:'DM Mono', fontSize:13, color:'var(--slate-500)', borderBottom:'1px solid var(--slate-50)' }}>{p.threshold}</td>
                  <td style={{ padding:'10px 14px', fontFamily:'DM Mono', fontSize:13, color:'var(--slate-700)', borderBottom:'1px solid var(--slate-50)' }}>₹{p.price.toLocaleString('en-IN')}</td>
                  <td style={{ padding:'10px 14px', fontSize:12, color:'var(--slate-500)', borderBottom:'1px solid var(--slate-50)', whiteSpace:'nowrap' }}>{p.rack}</td>
                  <td style={{ padding:'10px 14px', fontSize:12, color:'var(--slate-500)', borderBottom:'1px solid var(--slate-50)' }}>{p.vendors.join(', ')}</td>
                  <td style={{ padding:'10px 14px', borderBottom:'1px solid var(--slate-50)' }}><Badge status={stockStatus(p)} /></td>
                </tr>
              ))}
            </tbody>
          </table>
          {filtered.length === 0 && (
            <div style={{ padding:40, textAlign:'center', color:'var(--slate-400)', fontSize:13 }}>No parts match your search.</div>
          )}
        </div>
      </div>

      {/* Add Part Modal */}
      {showAdd && <AddPartModal onClose={() => setShowAdd(false)} />}
    </div>
  );
}

function AddPartModal({ onClose }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:100 }} onClick={onClose}>
      <div style={{ background:'#fff', borderRadius:12, padding:28, width:480, boxShadow:'0 20px 48px rgba(0,0,0,0.18)' }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
          <h2 style={{ fontSize:17, fontWeight:700 }}>Add Spare Part</h2>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--slate-400)' }}><Icon name="X" size={18} /></button>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
          {[{label:'Part Number', ph:'SP-BRK-001', mono:true},{label:'Part Name', ph:'Brake Pad – Front'},{label:'Unit Price (₹)', ph:'450.00'},{label:'Current Quantity', ph:'0'},{label:'Threshold Value', ph:'10'},{label:'Rack Number', ph:'1'}].map(f => (
            <div key={f.label}>
              <label style={{ display:'block', fontSize:12, fontWeight:600, color:'var(--slate-600)', marginBottom:4 }}>{f.label}</label>
              <input placeholder={f.ph} style={{ width:'100%', padding:'8px 10px', fontSize:13, fontFamily: f.mono ? 'DM Mono' : 'DM Sans', border:'1px solid var(--slate-200)', borderRadius:6, outline:'none', color:'var(--slate-900)' }} />
            </div>
          ))}
          <div>
            <label style={{ display:'block', fontSize:12, fontWeight:600, color:'var(--slate-600)', marginBottom:4 }}>Size Category</label>
            <select style={{ width:'100%', padding:'8px 10px', fontSize:13, border:'1px solid var(--slate-200)', borderRadius:6, outline:'none', fontFamily:'DM Sans' }}>
              <option>SMALL</option><option selected>MEDIUM</option><option>LARGE</option>
            </select>
          </div>
        </div>
        <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:22 }}>
          <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
          <Btn variant="primary" onClick={onClose}>Add Part</Btn>
        </div>
      </div>
    </div>
  );
}

// ── Vendors Screen ────────────────────────────────────────────────────────────
function VendorsScreen() {
  return (
    <div style={{ flex:1, overflow:'auto' }}>
      <TopBar title="Vendors" subtitle={`${VENDORS.length} registered vendors`} actions={[<Btn key="add" variant="primary" icon="Plus">Add Vendor</Btn>]} />
      <div style={{ padding:24, display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14 }}>
        {VENDORS.map(v => (
          <div key={v.id} style={{ background:'#fff', border:'1px solid var(--slate-200)', borderRadius:8, padding:'18px 20px', boxShadow:'var(--shadow-card)' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
              <div style={{ width:36, height:36, background:'var(--slate-100)', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <Icon name="Building2" size={16} color="var(--slate-500)" />
              </div>
              <span style={{ background:'#EFF6FF', color:'#1D4ED8', fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:4, letterSpacing:'0.06em', textTransform:'uppercase' }}>{v.parts} parts</span>
            </div>
            <div style={{ fontSize:14, fontWeight:700, color:'var(--slate-900)', marginBottom:4 }}>{v.name}</div>
            <div style={{ fontSize:12, color:'var(--slate-400)', marginBottom:10, lineHeight:1.5 }}>{v.address}</div>
            <div style={{ borderTop:'1px solid var(--slate-100)', paddingTop:10, display:'flex', flexDirection:'column', gap:4 }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:12, color:'var(--slate-600)' }}>
                <Icon name="Phone" size={12} color="var(--slate-400)" />
                <span style={{ fontFamily:'DM Mono', fontSize:11 }}>{v.contact}</span>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:12, color:'var(--slate-600)' }}>
                <Icon name="Mail" size={12} color="var(--slate-400)" />
                <span>{v.email}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Orders Screen ─────────────────────────────────────────────────────────────
function OrdersScreen() {
  return (
    <div style={{ flex:1, overflow:'auto' }}>
      <TopBar title="Orders" subtitle="Purchase orders to vendors" actions={[<Btn key="new" variant="primary" icon="Plus">New Order</Btn>]} />
      <div style={{ padding:24 }}>
        <div style={{ background:'#fff', border:'1px solid var(--slate-200)', borderRadius:8, boxShadow:'var(--shadow-card)', overflow:'hidden' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'var(--slate-50)' }}>
                {['Order ID','Date','Vendor','Items','Total','Status'].map(h =>
                  <th key={h} style={{ padding:'9px 16px', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--slate-400)', textAlign:'left', borderBottom:'1px solid var(--slate-200)' }}>{h}</th>
                )}
              </tr>
            </thead>
            <tbody>
              {ORDERS.map(o => (
                <tr key={o.id} onMouseEnter={e=>e.currentTarget.style.background='#FFFBEB'} onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                  <td style={{ padding:'12px 16px', fontFamily:'DM Mono', fontSize:13, fontWeight:500, color:'var(--slate-700)', borderBottom:'1px solid var(--slate-50)' }}>#{o.id}</td>
                  <td style={{ padding:'12px 16px', fontSize:13, color:'var(--slate-500)', borderBottom:'1px solid var(--slate-50)' }}>{o.date}</td>
                  <td style={{ padding:'12px 16px', fontSize:13, fontWeight:500, color:'var(--slate-900)', borderBottom:'1px solid var(--slate-50)' }}>{o.vendor}</td>
                  <td style={{ padding:'12px 16px', fontFamily:'DM Mono', fontSize:13, color:'var(--slate-600)', borderBottom:'1px solid var(--slate-50)' }}>{o.items}</td>
                  <td style={{ padding:'12px 16px', fontFamily:'DM Mono', fontSize:13, fontWeight:600, color:'var(--slate-900)', borderBottom:'1px solid var(--slate-50)' }}>{fmt(o.total)}</td>
                  <td style={{ padding:'12px 16px', borderBottom:'1px solid var(--slate-50)' }}><OrderBadge status={o.status} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── Sales Screen ──────────────────────────────────────────────────────────────
function SalesScreen() {
  const total = SALES.reduce((a,s) => a+s.total, 0);
  return (
    <div style={{ flex:1, overflow:'auto' }}>
      <TopBar title="Sales" subtitle={`${SALES.length} transactions · ${fmt(total)} total`} actions={[<Btn key="rec" variant="primary" icon="Plus">Record Sale</Btn>]} />
      <div style={{ padding:24 }}>
        <div style={{ background:'#fff', border:'1px solid var(--slate-200)', borderRadius:8, boxShadow:'var(--shadow-card)', overflow:'hidden' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'var(--slate-50)' }}>
                {['Transaction ID','Date','Part No.','Part Name','Qty','Total'].map(h =>
                  <th key={h} style={{ padding:'9px 16px', fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--slate-400)', textAlign:'left', borderBottom:'1px solid var(--slate-200)' }}>{h}</th>
                )}
              </tr>
            </thead>
            <tbody>
              {SALES.map(s => (
                <tr key={s.id} onMouseEnter={e=>e.currentTarget.style.background='#FFFBEB'} onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                  <td style={{ padding:'11px 16px', fontFamily:'DM Mono', fontSize:12, color:'var(--slate-700)', borderBottom:'1px solid var(--slate-50)' }}>{s.id}</td>
                  <td style={{ padding:'11px 16px', fontSize:13, color:'var(--slate-500)', borderBottom:'1px solid var(--slate-50)' }}>{s.date}</td>
                  <td style={{ padding:'11px 16px', fontFamily:'DM Mono', fontSize:12, letterSpacing:'0.04em', color:'var(--slate-700)', borderBottom:'1px solid var(--slate-50)' }}>{s.part}</td>
                  <td style={{ padding:'11px 16px', fontSize:13, fontWeight:500, color:'var(--slate-900)', borderBottom:'1px solid var(--slate-50)' }}>{s.partName}</td>
                  <td style={{ padding:'11px 16px', fontFamily:'DM Mono', fontSize:13, color:'var(--slate-600)', borderBottom:'1px solid var(--slate-50)' }}>{s.qty}</td>
                  <td style={{ padding:'11px 16px', fontFamily:'DM Mono', fontSize:13, fontWeight:600, color:'#059669', borderBottom:'1px solid var(--slate-50)' }}>{fmt(s.total)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── Reports Screen ────────────────────────────────────────────────────────────
function ReportsScreen() {
  const monthly = [
    { month:'Nov', val:210000 }, { month:'Dec', val:285000 },
    { month:'Jan', val:198000 }, { month:'Feb', val:243000 },
    { month:'Mar', val:312000 }, { month:'Apr', val:84320 },
  ];
  const max = Math.max(...monthly.map(m=>m.val));

  return (
    <div style={{ flex:1, overflow:'auto' }}>
      <TopBar title="Reports" subtitle="Revenue analytics & JIT summaries" actions={[<Btn key="gen" variant="primary" icon="Download">Export Report</Btn>]} />
      <div style={{ padding:24, display:'grid', gridTemplateColumns:'2fr 1fr', gap:16 }}>
        {/* Monthly chart */}
        <div style={{ background:'#fff', border:'1px solid var(--slate-200)', borderRadius:8, padding:24, boxShadow:'var(--shadow-card)' }}>
          <div style={{ fontSize:14, fontWeight:700, color:'var(--slate-900)', marginBottom:4 }}>Monthly Revenue</div>
          <div style={{ fontSize:12, color:'var(--slate-400)', marginBottom:20 }}>Nov 2025 – Apr 2026</div>
          <div style={{ display:'flex', alignItems:'flex-end', gap:12, height:140 }}>
            {monthly.map(m => (
              <div key={m.month} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
                <div style={{ fontFamily:'DM Mono', fontSize:10, color:'var(--slate-400)' }}>
                  {m.val >= 1000 ? (m.val/1000).toFixed(0)+'k' : m.val}
                </div>
                <div style={{
                  width:'100%', borderRadius:'4px 4px 0 0',
                  background: m.month==='Apr' ? 'var(--amber)' : 'var(--slate-200)',
                  height: `${Math.round((m.val/max)*110)}px`,
                  transition:'height 300ms ease',
                }} />
                <div style={{ fontSize:11, color:'var(--slate-400)', fontWeight:500 }}>{m.month}</div>
              </div>
            ))}
          </div>
        </div>

        {/* JIT summary */}
        <div style={{ background:'#fff', border:'1px solid var(--slate-200)', borderRadius:8, padding:20, boxShadow:'var(--shadow-card)' }}>
          <div style={{ fontSize:14, fontWeight:700, marginBottom:4 }}>JIT Threshold Status</div>
          <div style={{ fontSize:12, color:'var(--slate-400)', marginBottom:16 }}>Based on 7-day sales velocity</div>
          {[
            { label:'Within threshold', count:7, color:'#059669', bg:'#F0FDF4' },
            { label:'Near threshold',   count:2, color:'#B45309', bg:'#FFFBEB' },
            { label:'Below threshold',  count:1, color:'#DC2626', bg:'#FFF1F2' },
          ].map(r => (
            <div key={r.label} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 0', borderBottom:'1px solid var(--slate-50)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ width:8, height:8, borderRadius:'50%', background:r.color }} />
                <span style={{ fontSize:13, color:'var(--slate-700)' }}>{r.label}</span>
              </div>
              <span style={{ background:r.bg, color:r.color, fontFamily:'DM Mono', fontSize:12, fontWeight:700, padding:'2px 10px', borderRadius:4 }}>{r.count}</span>
            </div>
          ))}
          <Btn variant="secondary" style={{ marginTop:16, width:'100%' }}>Recalculate JIT</Btn>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState(() => localStorage.getItem('aspas_screen') || 'dashboard');
  useEffect(() => { localStorage.setItem('aspas_screen', active); }, [active]);

  const screen = { dashboard:<DashboardScreen setActive={setActive}/>, inventory:<InventoryScreen/>, orders:<OrdersScreen/>, sales:<SalesScreen/>, vendors:<VendorsScreen/>, reports:<ReportsScreen/> };

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar active={active} setActive={setActive} />
      {screen[active] || screen.dashboard}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
