function SalesScreen() {
  const [salesDate, setSalesDate] = useState(new Date().toISOString().split('T')[0]);
  const { data, loading, error, refresh } = useApi(`/sales/transactions?date=${salesDate}`, [salesDate]);
  const stats = useApi(`/sales/stats?date=${salesDate}`, [salesDate]);
  const [showRecord, setShowRecord] = useState(false);
  const [toast, setToast] = useState(null);
  const sales = data || [];
  const statData = stats.data || {};

  async function handleRecordSale(formData) {
    try {
      await apiFetch('/sales', { method: 'POST', body: JSON.stringify(formData) });
      setToast({ msg: 'Sale recorded.', type: 'success' });
      setShowRecord(false);
      refresh();
      stats.refresh();
    } catch (e) {
      setToast({ msg: e.message, type: 'error' });
    }
  }

  return (
    <div style={{ flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column' }}>
      <TopBar title="Sales" subtitle={loading ? 'Loading…' : `${sales.length} transactions`} actions={[
        <input key="date" type="date" value={salesDate} onChange={e => setSalesDate(e.target.value)} style={{ padding: '7px 12px', fontSize: 13, border: '1px solid var(--slate-200)', borderRadius: 6, outline: 'none', fontFamily: 'DM Sans', marginRight: 8 }} />,
        <Btn key="rec" variant="primary" icon="Plus" onClick={() => setShowRecord(true)}>Record Sale</Btn>
      ]} />
      <div style={{ padding: 24 }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 14, marginBottom: 24 }}>
          <div style={{ background: '#fff', border: '1px solid var(--slate-200)', borderRadius: 8, padding: '16px 20px', boxShadow: 'var(--shadow-card)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.07em', textTransform: 'uppercase', color: 'var(--slate-400)' }}>{salesDate === new Date().toISOString().split('T')[0] ? "Today's Revenue" : "Selected Day's Revenue"}</div>
              <div style={{ width: 30, height: 30, borderRadius: 6, background: 'var(--slate-100)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="IndianRupee" size={14} color="#059669" /></div>
            </div>
            <div style={{ fontFamily: 'DM Mono', fontSize: 26, fontWeight: 700, color: 'var(--slate-900)' }}>{stats.loading ? '…' : fmt(statData.totalRevenue || 0)}</div>
          </div>
          <div style={{ background: '#fff', border: '1px solid var(--slate-200)', borderRadius: 8, padding: '16px 20px', boxShadow: 'var(--shadow-card)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.07em', textTransform: 'uppercase', color: 'var(--slate-400)' }}>Transaction Count</div>
              <div style={{ width: 30, height: 30, borderRadius: 6, background: 'var(--slate-100)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="ShoppingCart" size={14} color="var(--navy-500)" /></div>
            </div>
            <div style={{ fontFamily: 'DM Mono', fontSize: 26, fontWeight: 700, color: 'var(--slate-900)' }}>{stats.loading ? '…' : (statData.transactionCount || 0)}</div>
          </div>
        </div>

        {error ? <ErrorBox message={error} onRetry={refresh} /> : (
          <div style={{ background: '#fff', border: '1px solid var(--slate-200)', borderRadius: 8, boxShadow: 'var(--shadow-card)', overflow: 'hidden' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead><tr><TH>ID</TH><TH>Date</TH><TH>Time</TH><TH>Part No.</TH><TH>Part Name</TH><TH>Qty</TH><TH>Total</TH></tr></thead>
              <tbody>
                {loading ? <SkeletonRows cols={7} rows={6} /> : sales.length === 0 ? (
                  <tr><td colSpan={7} style={{ padding: 40, textAlign: 'center', color: 'var(--slate-400)', fontSize: 13 }}>No sales recorded yet.</td></tr>
                ) : sales.map((s, i) => {
                  const [d, t] = (s.transactionDate || '').split('T');
                  return (
                  <tr key={s.transactionId || i} onMouseEnter={e => e.currentTarget.style.background = '#FFFBEB'} onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                    <TD mono style={{ color: 'var(--slate-500)' }}>{s.transactionId || `#${i+1}`}</TD>
                    <TD style={{ color: 'var(--slate-500)' }}>{d || '—'}</TD>
                    <TD style={{ color: 'var(--slate-500)' }}>{t ? t.substring(0,5) : '—'}</TD>
                    <TD mono>{s.partNumber || '—'}</TD>
                    <TD style={{ fontWeight: 500, color: 'var(--slate-900)' }}>{s.partName || '—'}</TD>
                    <TD mono>{s.quantitySold ?? '—'}</TD>
                    <TD mono style={{ fontWeight: 600, color: '#059669' }}>{fmt(s.revenueAmount)}</TD>
                  </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {showRecord && <RecordSaleModal onClose={() => setShowRecord(false)} onSubmit={handleRecordSale} />}
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

function RecordSaleModal({ onClose, onSubmit }) {
  const [form, setForm] = useState({ partNumber: '', quantity: 1 });
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState('');
  const [open, setOpen] = useState(false);
  const partsApi = useApi('/parts');
  const parts = partsApi.data || [];
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const filtered = parts.filter(p =>
    p.partNumber.toLowerCase().includes(search.toLowerCase()) ||
    (p.partName || '').toLowerCase().includes(search.toLowerCase())
  );
  const selectedPart = parts.find(p => p.partNumber === form.partNumber);

  async function handleSubmit() { setSaving(true); await onSubmit({ ...form, quantity: parseInt(form.quantity) }); setSaving(false); }

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }} onClick={onClose}>
      <div style={{ background: '#fff', borderRadius: 12, padding: 28, width: 380, boxShadow: '0 20px 48px rgba(0,0,0,0.18)' }} onClick={e => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <h2 style={{ fontSize: 17, fontWeight: 700 }}>Record Sale</h2>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--slate-400)' }}><Icon name="X" size={18} /></button>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div style={{ position: 'relative' }}>
            <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--slate-600)', marginBottom: 4 }}>Part</label>
            <div
              onClick={() => setOpen(o => !o)}
              style={{ width: '100%', padding: '8px 10px', fontSize: 13, fontFamily: 'DM Sans', border: `1px solid ${open ? '#FDE68A' : 'var(--slate-200)'}`, borderRadius: 6, cursor: 'pointer', background: '#fff', display: 'flex', justifyContent: 'space-between', alignItems: 'center', boxSizing: 'border-box' }}
            >
              {selectedPart
                ? <span><span style={{ fontFamily: 'DM Mono', color: 'var(--slate-700)' }}>{selectedPart.partNumber}</span><span style={{ color: 'var(--slate-400)', marginLeft: 8 }}>{selectedPart.partName}</span></span>
                : <span style={{ color: 'var(--slate-400)' }}>Select a part…</span>}
              <Icon name={open ? 'ChevronUp' : 'ChevronDown'} size={14} />
            </div>
            {open && (
              <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 200, background: '#fff', border: '1px solid var(--slate-200)', borderRadius: 6, boxShadow: '0 8px 24px rgba(0,0,0,0.12)', marginTop: 4 }}>
                <div style={{ padding: '8px 8px 4px' }}>
                  <input
                    autoFocus
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                    placeholder="Search part number or name…"
                    style={{ width: '100%', padding: '6px 8px', fontSize: 12, border: '1px solid var(--slate-200)', borderRadius: 4, outline: 'none', fontFamily: 'DM Sans', boxSizing: 'border-box' }}
                  />
                </div>
                <div style={{ maxHeight: 200, overflowY: 'auto' }}>
                  {partsApi.loading
                    ? <div style={{ padding: 12, fontSize: 12, color: 'var(--slate-400)' }}>Loading…</div>
                    : filtered.length === 0
                      ? <div style={{ padding: 12, fontSize: 12, color: 'var(--slate-400)' }}>No parts found</div>
                      : filtered.map(p => (
                          <div
                            key={p.partNumber}
                            onClick={() => { set('partNumber', p.partNumber); setOpen(false); setSearch(''); }}
                            style={{ padding: '8px 12px', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: form.partNumber === p.partNumber ? '#FFFBEB' : '#fff' }}
                            onMouseEnter={e => e.currentTarget.style.background = form.partNumber === p.partNumber ? '#FFFBEB' : '#F9FAFB'}
                            onMouseLeave={e => e.currentTarget.style.background = form.partNumber === p.partNumber ? '#FFFBEB' : '#fff'}
                          >
                            <span style={{ fontFamily: 'DM Mono', fontSize: 12, color: 'var(--slate-700)' }}>{p.partNumber}</span>
                            <span style={{ fontSize: 12, color: 'var(--slate-500)', maxWidth: 160, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.partName}</span>
                          </div>
                        ))
                  }
                </div>
              </div>
            )}
          </div>
          <div>
            <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--slate-600)', marginBottom: 4 }}>Quantity Sold</label>
            <input type="number" min="1" value={form.quantity} onChange={e => set('quantity', e.target.value)} style={{ width: '100%', padding: '8px 10px', fontSize: 13, fontFamily: 'DM Mono', border: '1px solid var(--slate-200)', borderRadius: 6, outline: 'none', boxSizing: 'border-box' }} />
          </div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 22 }}>
          <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
          <Btn variant="primary" onClick={handleSubmit} disabled={saving || !form.partNumber}>{saving ? 'Saving…' : 'Record Sale'}</Btn>
        </div>
      </div>
    </div>
  );
}

// ── Reports ────────────────────────────────────────────────────────────────
function ReportsScreen() {
  const [monthlyKey, setMonthlyKey] = React.useState(0);
  const [monthlyState, setMonthlyState] = React.useState({ data: null, loading: true, error: null });

  const [dateStr, setDateStr] = useState(new Date().toISOString().split('T')[0]);
  const [dailyRefreshKey, setDailyRefreshKey] = useState(0);
  const dailyApi = useApi(`/reports/daily/${dateStr}`, [dateStr, dailyRefreshKey]);

  const [monthStr, setMonthStr] = useState(`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2, '0')}`);
  const [moYear, moMonth] = monthStr.split('-');
  const [moRefreshKey, setMoRefreshKey] = useState(0);
  const currentMonthApi = useApi(`/reports/monthly/${moYear}/${parseInt(moMonth, 10)}`, [moYear, moMonth, moRefreshKey]);

  React.useEffect(() => {
    setMonthlyState({ data: null, loading: true, error: null });
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const now = new Date();
    const targets = Array.from({ length: 6 }, (_, i) => {
      const d = new Date(now.getFullYear(), now.getMonth() - (5 - i), 1);
      return { year: d.getFullYear(), month: d.getMonth() + 1, label: monthNames[d.getMonth()] };
    });
    Promise.all(targets.map(({ year, month, label }) =>
      apiFetch(`/reports/monthly/${year}/${month}`)
        .then(d => ({ ...d, label }))
        .catch(() => ({ totalRevenue: 0, label }))
    )).then(results => setMonthlyState({ data: results, loading: false, error: null }))
      .catch(e => setMonthlyState({ data: null, loading: false, error: e.message }));
  }, [monthlyKey]);

  const monthly = { ...monthlyState, refresh: () => setMonthlyKey(k => k + 1) };
  const jit     = useApi('/jit/thresholds');
  const [toast, setToast] = useState(null);

  const parts   = jit.data || [];
  const within  = parts.filter(p => stockStatus(p) === 'ok').length;
  const near    = parts.filter(p => stockStatus(p) === 'low').length;
  const below   = parts.filter(p => stockStatus(p) === 'critical').length;

  // Build chart from monthly revenue data
  const months = monthly.data || [];
  const barData = months.length > 0 ? months.slice(-6) : [
    { label: 'Nov', value: 210000 }, { label: 'Dec', value: 285000 },
    { label: 'Jan', value: 198000 }, { label: 'Feb', value: 243000 },
    { label: 'Mar', value: 312000 }, { label: 'Apr', value: 84320 },
  ];
  const maxVal = Math.max(...barData.map(m => m.totalRevenue || m.value || 1));

  async function handleMonthlyRefreshBackend() {
    try {
      const now = new Date();
      await apiFetch(`/reports/monthly/${now.getFullYear()}/${now.getMonth()+1}/refresh`);
      monthly.refresh();
      setToast({ msg: 'Monthly report refreshed.', type: 'success' });
    } catch(e) {
      setToast({ msg: e.message, type: 'error' });
    }
  }

  async function handleDailyRefreshBackend() {
    try {
      await apiFetch(`/reports/daily/${dateStr}/refresh`);
      setDailyRefreshKey(k => k+1);
      setToast({ msg: 'Daily report refreshed.', type: 'success' });
    } catch(e) {
      setToast({ msg: e.message, type: 'error' });
    }
  }

  async function handleCurrentMonthRefreshBackend() {
    try {
      await apiFetch(`/reports/monthly/${moYear}/${parseInt(moMonth, 10)}/refresh`);
      setMoRefreshKey(k => k+1);
      setToast({ msg: 'Monthly report refreshed.', type: 'success' });
    } catch(e) {
      setToast({ msg: e.message, type: 'error' });
    }
  }

  const d = dailyApi.data || {};
  const hourly = d.hourlyDataPoints || [];
  const maxHourly = Math.max(...hourly.map(h => h.revenue || 1));

  return (
    <div style={{ flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column' }}>
      <TopBar title="Reports" subtitle="Revenue analytics & JIT summaries" actions={[<Btn key="gen" variant="secondary" icon="RefreshCw" onClick={() => { monthly.refresh(); jit.refresh(); dailyApi.refresh(); }}>Refresh All</Btn>]} />
      <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 24 }}>
        
        {/* Daily Report */}
        <div style={{ background: '#fff', border: '1px solid var(--slate-200)', borderRadius: 8, boxShadow: 'var(--shadow-card)', padding: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>Daily Operations Report</div>
              <div style={{ fontSize: 13, color: 'var(--slate-500)' }}>Performance metrics for selected date</div>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <input type="date" value={dateStr} onChange={e => setDateStr(e.target.value)} style={{ padding: '7px 12px', fontSize: 13, border: '1px solid var(--slate-200)', borderRadius: 6, outline: 'none', fontFamily: 'DM Sans' }} />
              <Btn variant="secondary" icon="RefreshCw" onClick={handleDailyRefreshBackend}>Refresh Daily</Btn>
            </div>
          </div>
          {dailyApi.loading ? <SkeletonRows cols={3} rows={2} /> : dailyApi.error ? <ErrorBox message={dailyApi.error} onRetry={dailyApi.refresh} /> : (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16 }}>
              {/* Daily Stats */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                <div style={{ background: '#F9FAFB', padding: 14, borderRadius: 6 }}>
                  <div style={{ fontSize: 11, color: 'var(--slate-500)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 4 }}>Total Revenue</div>
                  <div style={{ fontFamily: 'DM Mono', fontSize: 22, fontWeight: 700, color: '#059669' }}>{fmt(d.totalRevenue)}</div>
                </div>
                <div style={{ background: '#F9FAFB', padding: 14, borderRadius: 6, display: 'flex', gap: 16 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 11, color: 'var(--slate-500)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 4 }}>Transactions</div>
                    <div style={{ fontFamily: 'DM Mono', fontSize: 18, fontWeight: 700 }}>{d.transactionCount || 0}</div>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 11, color: 'var(--slate-500)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 4 }}>Avg Sale</div>
                    <div style={{ fontFamily: 'DM Mono', fontSize: 18, fontWeight: 700 }}>{fmt(d.averageTransactionValue)}</div>
                  </div>
                </div>
              </div>

              {/* Hourly Chart */}
              <div style={{ background: '#F9FAFB', padding: 14, borderRadius: 6 }}>
                <div style={{ fontSize: 11, color: 'var(--slate-500)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 12 }}>Hourly Revenue</div>
                <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height: 100 }}>
                  {hourly.length === 0 ? <div style={{ fontSize: 12, color: 'var(--slate-400)', width: '100%', textAlign: 'center', alignSelf: 'center' }}>No hourly data</div> : hourly.map((h, i) => (
                    <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                      <div style={{ width: '100%', background: 'var(--amber)', borderRadius: '2px 2px 0 0', height: `${Math.round((h.revenue / maxHourly) * 80)}px` }} />
                      <div style={{ fontSize: 9, color: 'var(--slate-400)' }}>{h.hour}:00</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Top Selling Parts */}
              <div style={{ background: '#F9FAFB', padding: 14, borderRadius: 6, display: 'flex', flexDirection: 'column' }}>
                <div style={{ fontSize: 11, color: 'var(--slate-500)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Top Selling Parts</div>
                <div style={{ flex: 1, overflow: 'auto' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                    <tbody>
                      {(!d.topSellingParts || d.topSellingParts.length === 0) ? <tr><td style={{ color: 'var(--slate-400)', padding: 8 }}>No sales data.</td></tr> : d.topSellingParts.slice(0, 3).map((p, i) => (
                        <tr key={i} style={{ borderBottom: '1px solid var(--slate-100)' }}>
                          <td style={{ padding: '6px 0', fontFamily: 'DM Mono' }}>{p.partNumber}</td>
                          <td style={{ padding: '6px 0', textAlign: 'center' }}>{p.qtySold} units</td>
                          <td style={{ padding: '6px 0', textAlign: 'right', fontWeight: 600, color: '#059669' }}>{fmt(p.revenue)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}
        </div>

        {/* Monthly Operations Report */}
        <div style={{ background: '#fff', border: '1px solid var(--slate-200)', borderRadius: 8, boxShadow: 'var(--shadow-card)', padding: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>Monthly Operations Report</div>
              <div style={{ fontSize: 13, color: 'var(--slate-500)' }}>Performance metrics for selected month</div>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <input type="month" value={monthStr} onChange={e => setMonthStr(e.target.value)} style={{ padding: '7px 12px', fontSize: 13, border: '1px solid var(--slate-200)', borderRadius: 6, outline: 'none', fontFamily: 'DM Sans' }} />
              <Btn variant="secondary" icon="RefreshCw" onClick={handleCurrentMonthRefreshBackend}>Refresh Monthly</Btn>
            </div>
          </div>
          {currentMonthApi.loading ? <SkeletonRows cols={2} rows={2} /> : currentMonthApi.error ? <ErrorBox message={currentMonthApi.error} onRetry={currentMonthApi.refresh} /> : (() => {
            const md = currentMonthApi.data || {};
            const dailyDP = md.dailyDataPoints || [];
            const maxDaily = Math.max(...dailyDP.map(d => d.revenue || 1));
            return (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 2fr', gap: 16 }}>
                {/* Monthly Stats */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <div style={{ background: '#F9FAFB', padding: 14, borderRadius: 6 }}>
                    <div style={{ fontSize: 11, color: 'var(--slate-500)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 4 }}>Total Revenue</div>
                    <div style={{ fontFamily: 'DM Mono', fontSize: 22, fontWeight: 700, color: '#059669' }}>{fmt(md.totalRevenue)}</div>
                  </div>
                  <div style={{ background: '#F9FAFB', padding: 14, borderRadius: 6 }}>
                    <div style={{ fontSize: 11, color: 'var(--slate-500)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 4 }}>Average Daily Rev.</div>
                    <div style={{ fontFamily: 'DM Mono', fontSize: 18, fontWeight: 700 }}>{fmt(md.averageDailyRevenue)}</div>
                  </div>
                </div>

                {/* Daily Bar Chart */}
                <div style={{ background: '#F9FAFB', padding: 14, borderRadius: 6 }}>
                  <div style={{ fontSize: 11, color: 'var(--slate-500)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 12 }}>Daily Revenue Breakdown</div>
                  <div style={{ display: 'flex', alignItems: 'flex-end', gap: 4, height: 100, overflowX: 'auto' }}>
                    {dailyDP.length === 0 ? <div style={{ fontSize: 12, color: 'var(--slate-400)', width: '100%', textAlign: 'center', alignSelf: 'center' }}>No daily data points</div> : dailyDP.map((d, i) => (
                      <div key={i} title={`Day ${d.day}: ${fmt(d.revenue)}`} style={{ flex: 1, minWidth: 10, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                        <div style={{ width: '100%', minWidth: 8, background: 'var(--amber)', borderRadius: '2px 2px 0 0', height: `${Math.round((d.revenue / maxDaily) * 80)}px` }} />
                        <div style={{ fontSize: 8, color: 'var(--slate-400)' }}>{d.day}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          })()}
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 16 }}>
          {/* Monthly Chart */}
          <div style={{ background: '#fff', border: '1px solid var(--slate-200)', borderRadius: 8, padding: 24, boxShadow: 'var(--shadow-card)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>Revenue Trend</div>
                <div style={{ fontSize: 12, color: 'var(--slate-400)' }}>
                  {monthly.loading ? 'Loading from API…' : monthly.error ? 'Using sample data (API unavailable)' : 'Live from /api/reports/monthly'}
                </div>
              </div>
              <button onClick={handleMonthlyRefreshBackend} disabled={monthly.loading} style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'var(--slate-100)', border: 'none', padding: '6px 10px', borderRadius: 6, fontSize: 12, cursor: 'pointer', color: 'var(--slate-700)' }}><Icon name="RefreshCw" size={12} /> Sync</button>
            </div>
            {monthly.error && <div style={{ fontSize: 12, color: '#B45309', background: '#FFFBEB', padding: '8px 12px', borderRadius: 6, marginBottom: 16 }}>{monthly.error}</div>}
            <div style={{ display: 'flex', alignItems: 'flex-end', gap: 12, height: 140 }}>
              {barData.map((m, i) => {
                const val = m.totalRevenue || m.value || 0;
                const label = m.label || m.reportDate || m.month || '';
                return (
                  <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
                    <div style={{ fontFamily: 'DM Mono', fontSize: 10, color: 'var(--slate-400)' }}>{val >= 1000 ? (val / 1000).toFixed(0) + 'k' : val}</div>
                    <div style={{ width: '100%', borderRadius: '4px 4px 0 0', background: i === barData.length - 1 ? 'var(--amber)' : 'var(--slate-200)', height: `${Math.round((val / maxVal) * 110)}px`, transition: 'height 400ms ease' }} />
                    <div style={{ fontSize: 11, color: 'var(--slate-400)', fontWeight: 500 }}>{String(label).slice(0, 3)}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* JIT */}
          <div style={{ background: '#fff', border: '1px solid var(--slate-200)', borderRadius: 8, padding: 20, boxShadow: 'var(--shadow-card)' }}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>JIT Threshold Status</div>
            <div style={{ fontSize: 12, color: 'var(--slate-400)', marginBottom: 16 }}>Based on 7-day sales velocity</div>
            {jit.loading ? <SkeletonRows cols={2} rows={3} /> : jit.error ? <ErrorBox message={jit.error} onRetry={jit.refresh} /> : (
              <>
                {[
                  { label: 'Within threshold', count: within, color: '#059669', bg: '#F0FDF4' },
                  { label: 'Near threshold',   count: near,   color: '#B45309', bg: '#FFFBEB' },
                  { label: 'Below threshold',  count: below,  color: '#DC2626', bg: '#FFF1F2' },
                ].map(r => (
                  <div key={r.label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: '1px solid var(--slate-50)' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <div style={{ width: 8, height: 8, borderRadius: '50%', background: r.color }} />
                      <span style={{ fontSize: 13, color: 'var(--slate-700)' }}>{r.label}</span>
                    </div>
                    <span style={{ background: r.bg, color: r.color, fontFamily: 'DM Mono', fontSize: 12, fontWeight: 700, padding: '2px 10px', borderRadius: 4 }}>{r.count}</span>
                  </div>
                ))}
                <div style={{ marginTop: 16 }}>
                  <Btn variant="secondary" style={{ width: '100%', justifyContent: 'center' }} icon="Activity" onClick={async () => {
                    try { await apiFetch('/jit/calculate', { method: 'POST' }); jit.refresh(); }
                    catch (e) { alert(e.message); }
                  }}>Recalculate JIT</Btn>
                </div>
              </>
            )}
          </div>
        </div>
      </div>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState(() => localStorage.getItem('aspas_screen') || 'dashboard');
  useEffect(() => { localStorage.setItem('aspas_screen', active); }, [active]);
  const screens = { dashboard: <DashboardScreen setActive={setActive} />, inventory: <InventoryScreen />, orders: <OrdersScreen />, sales: <SalesScreen />, vendors: <VendorsScreen />, reports: <ReportsScreen /> };
  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar active={active} setActive={setActive} />
      {screens[active] || screens.dashboard}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
