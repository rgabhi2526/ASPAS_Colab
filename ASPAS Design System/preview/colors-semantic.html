<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
  .chip { border-radius: 8px; padding: 14px 16px; }
  .chip-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .chip-text { font-size: 11px; opacity: 0.75; }
  .group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="group-label">Semantic / Status Colors</div>
<div class="grid">
  <div class="chip" style="background:#F0FDF4; color:#15803D">
    <div class="chip-label">In Stock</div>
    <div class="chip-text">bg #F0FDF4 · text #15803D</div>
  </div>
  <div class="chip" style="background:#FFF1F2; color:#DC2626">
    <div class="chip-label">Critical / Error</div>
    <div class="chip-text">bg #FFF1F2 · text #DC2626</div>
  </div>
  <div class="chip" style="background:#FFFBEB; color:#B45309">
    <div class="chip-label">Low Stock / Warn</div>
    <div class="chip-text">bg #FFFBEB · text #B45309</div>
  </div>
  <div class="chip" style="background:#F3F4F6; color:#4B5563">
    <div class="chip-label">Neutral / Draft</div>
    <div class="chip-text">bg #F3F4F6 · text #4B5563</div>
  </div>
</div>
</body>
</html>
