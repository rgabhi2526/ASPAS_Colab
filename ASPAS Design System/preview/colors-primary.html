<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; margin-bottom: 12px; }
  .swatch { flex: 1; height: 52px; border-radius: 6px; position: relative; }
  .label { font-size: 11px; font-weight: 500; color: #6B7280; margin-top: 4px; text-align: center; letter-spacing: 0.02em; }
  .group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 6px; }
  .val { font-size: 10px; color: #9CA3AF; font-family: 'DM Mono', monospace; text-align: center; }
</style>
</head>
<body>
<div class="group-label">Navy (Primary)</div>
<div class="row">
  <div>
    <div class="swatch" style="background:#060D16"></div>
    <div class="label">950</div><div class="val">#060D16</div>
  </div>
  <div>
    <div class="swatch" style="background:#0F1C2E"></div>
    <div class="label">900</div><div class="val">#0F1C2E</div>
  </div>
  <div>
    <div class="swatch" style="background:#162436"></div>
    <div class="label">800</div><div class="val">#162436</div>
  </div>
  <div>
    <div class="swatch" style="background:#1E3045"></div>
    <div class="label">700</div><div class="val">#1E3045</div>
  </div>
  <div>
    <div class="swatch" style="background:#274260"></div>
    <div class="label">600</div><div class="val">#274260</div>
  </div>
  <div>
    <div class="swatch" style="background:#34587E"></div>
    <div class="label">500</div><div class="val">#34587E</div>
  </div>
</div>
<div class="group-label" style="margin-top:8px">Amber (Accent)</div>
<div class="row">
  <div>
    <div class="swatch" style="background:#FFFBEB; border:1px solid #E5E7EB"></div>
    <div class="label">50</div><div class="val">#FFFBEB</div>
  </div>
  <div>
    <div class="swatch" style="background:#FEF3C7"></div>
    <div class="label">100</div><div class="val">#FEF3C7</div>
  </div>
  <div>
    <div class="swatch" style="background:#FDE68A"></div>
    <div class="label">200</div><div class="val">#FDE68A</div>
  </div>
  <div>
    <div class="swatch" style="background:#FBBF24"></div>
    <div class="label">400</div><div class="val">#FBBF24</div>
  </div>
  <div>
    <div class="swatch" style="background:#F59E0B"></div>
    <div class="label" style="font-weight:700;color:#374151">500 ★</div><div class="val">#F59E0B</div>
  </div>
  <div>
    <div class="swatch" style="background:#D97706"></div>
    <div class="label">600</div><div class="val">#D97706</div>
  </div>
  <div>
    <div class="swatch" style="background:#B45309"></div>
    <div class="label">700</div><div class="val">#B45309</div>
  </div>
</div>
</body>
</html>
