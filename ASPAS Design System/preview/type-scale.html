<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 20px; padding: 10px 0; border-bottom: 1px solid #F3F4F6; }
  .row:last-child { border-bottom: none; }
  .meta { min-width: 90px; font-size: 10px; font-family: 'DM Mono', monospace; color: #9CA3AF; }
  .specimen {}
</style>
</head>
<body>
<div class="row">
  <div class="meta">32px / 700</div>
  <div class="specimen" style="font-size:32px;font-weight:700;line-height:1.25;letter-spacing:-0.01em;color:#111827">Page Title</div>
</div>
<div class="row">
  <div class="meta">24px / 600</div>
  <div class="specimen" style="font-size:24px;font-weight:600;line-height:1.3;color:#111827">Section Heading</div>
</div>
<div class="row">
  <div class="meta">18px / 600</div>
  <div class="specimen" style="font-size:18px;font-weight:600;color:#111827">Card Title</div>
</div>
<div class="row">
  <div class="meta">16px / 500</div>
  <div class="specimen" style="font-size:16px;font-weight:500;color:#1F2937">Subheading / Nav Label</div>
</div>
<div class="row">
  <div class="meta">14px / 400</div>
  <div class="specimen" style="font-size:14px;font-weight:400;line-height:1.6;color:#374151">Body — Used for table rows, descriptions, and form helper text.</div>
</div>
<div class="row">
  <div class="meta">13px / 500</div>
  <div class="specimen" style="font-size:13px;font-weight:500;color:#374151">Label / Field Name</div>
</div>
<div class="row">
  <div class="meta">11px / 500 UC</div>
  <div class="specimen" style="font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#9CA3AF">Meta / Caption / Table Header</div>
</div>
</body>
</html>
