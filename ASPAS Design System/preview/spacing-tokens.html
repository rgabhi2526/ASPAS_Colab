<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-bottom: 20px; }
  .block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { width: 100%; background: #0F1C2E; border-radius: 4px; }
  .lbl { font-size: 10px; color: #9CA3AF; font-family: 'DM Mono', monospace; }
  .px  { font-size: 10px; color: #6B7280; }
  .radii { display: flex; gap: 12px; align-items: flex-end; margin-top: 8px; }
  .rbox { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .rsquare { background: #F59E0B; width: 40px; height: 40px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="section-label">Spacing Scale (4px base)</div>
<div class="grid">
  <div class="block"><div class="bar" style="height:4px"></div><div class="lbl">sp-1</div><div class="px">4px</div></div>
  <div class="block"><div class="bar" style="height:8px"></div><div class="lbl">sp-2</div><div class="px">8px</div></div>
  <div class="block"><div class="bar" style="height:12px"></div><div class="lbl">sp-3</div><div class="px">12px</div></div>
  <div class="block"><div class="bar" style="height:16px"></div><div class="lbl">sp-4</div><div class="px">16px</div></div>
  <div class="block"><div class="bar" style="height:20px"></div><div class="lbl">sp-5</div><div class="px">20px</div></div>
  <div class="block"><div class="bar" style="height:24px"></div><div class="lbl">sp-6</div><div class="px">24px</div></div>
  <div class="block"><div class="bar" style="height:32px"></div><div class="lbl">sp-8</div><div class="px">32px</div></div>
  <div class="block"><div class="bar" style="height:48px"></div><div class="lbl">sp-12</div><div class="px">48px</div></div>
</div>
<div class="section-label">Corner Radii</div>
<div class="radii">
  <div class="rbox"><div class="rsquare" style="border-radius:4px"></div><div class="lbl">4px badge</div></div>
  <div class="rbox"><div class="rsquare" style="border-radius:6px"></div><div class="lbl">6px btn/input</div></div>
  <div class="rbox"><div class="rsquare" style="border-radius:8px"></div><div class="lbl">8px card</div></div>
  <div class="rbox"><div class="rsquare" style="border-radius:12px"></div><div class="lbl">12px modal</div></div>
  <div class="rbox"><div class="rsquare" style="border-radius:9999px;width:40px;height:24px"></div><div class="lbl">full pill</div></div>
</div>
</body>
</html>
