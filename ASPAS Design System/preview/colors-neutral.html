<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .swatch { flex: 1; height: 48px; border-radius: 6px; }
  .label { font-size: 11px; font-weight: 500; color: #6B7280; margin-top: 4px; text-align: center; }
  .val { font-size: 10px; color: #9CA3AF; font-family: 'DM Mono', monospace; text-align: center; }
  .group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="group-label">Slate (Neutral)</div>
<div class="row">
  <div><div class="swatch" style="background:#F9FAFB; border:1px solid #E5E7EB"></div><div class="label">50</div><div class="val">#F9FAFB</div></div>
  <div><div class="swatch" style="background:#F3F4F6; border:1px solid #E5E7EB"></div><div class="label">100</div><div class="val">#F3F4F6</div></div>
  <div><div class="swatch" style="background:#E5E7EB"></div><div class="label">200</div><div class="val">#E5E7EB</div></div>
  <div><div class="swatch" style="background:#D1D5DB"></div><div class="label">300</div><div class="val">#D1D5DB</div></div>
  <div><div class="swatch" style="background:#9CA3AF"></div><div class="label">400</div><div class="val">#9CA3AF</div></div>
  <div><div class="swatch" style="background:#6B7280"></div><div class="label">500</div><div class="val">#6B7280</div></div>
  <div><div class="swatch" style="background:#4B5563"></div><div class="label">600</div><div class="val">#4B5563</div></div>
  <div><div class="swatch" style="background:#374151"></div><div class="label">700</div><div class="val">#374151</div></div>
  <div><div class="swatch" style="background:#1F2937"></div><div class="label">800</div><div class="val">#1F2937</div></div>
  <div><div class="swatch" style="background:#111827"></div><div class="label">900</div><div class="val">#111827</div></div>
</div>
</body>
</html>
