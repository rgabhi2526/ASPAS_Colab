<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="section-label">Status Badges</div>
<div class="row">
  <span class="badge badge-success">In Stock</span>
  <span class="badge badge-warning">Low Stock</span>
  <span class="badge badge-danger">Out of Stock</span>
  <span class="badge badge-neutral">Pending</span>
</div>
<div class="section-label">Size / Category Tags</div>
<div class="row">
  <span class="badge badge-neutral">Small</span>
  <span class="badge badge-neutral">Medium</span>
  <span class="badge badge-neutral">Large</span>
</div>
<div class="section-label">Part Number Chip</div>
<div class="row">
  <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:0.04em;background:#F3F4F6;color:#374151;padding:4px 10px;border-radius:6px;border:1px solid #E5E7EB">SP-BRK-001</span>
  <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:0.04em;background:#F3F4F6;color:#374151;padding:4px 10px;border-radius:6px;border:1px solid #E5E7EB">SP-ENG-002</span>
  <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:0.04em;background:#FEF3C7;color:#B45309;padding:4px 10px;border-radius:6px;border:1px solid #FDE68A">SP-SUS-001 ⚠</span>
</div>
</body>
</html>
