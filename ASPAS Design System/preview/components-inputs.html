<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-sans); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 5px; }
  .field input, .field select { width: 280px; display: block; }
  .field .helper { font-size: 12px; color: #9CA3AF; margin-top: 4px; }
  .field .error-msg { font-size: 12px; color: #DC2626; margin-top: 4px; }
  .row { display: flex; gap: 16px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="section-label">Form Inputs</div>
<div class="row">
  <div class="field">
    <label>Part Number</label>
    <input type="text" placeholder="e.g. SP-BRK-001" style="font-family:'DM Mono',monospace">
    <div class="helper">Unique identifier, auto-uppercased</div>
  </div>
  <div class="field">
    <label>Unit Price (₹)</label>
    <input type="number" value="450.00">
  </div>
</div>
<div class="row">
  <div class="field">
    <label>Size Category</label>
    <select>
      <option>SMALL</option>
      <option selected>MEDIUM</option>
      <option>LARGE</option>
    </select>
  </div>
  <div class="field">
    <label>Current Quantity</label>
    <input type="number" value="" placeholder="0" style="border-color:#EF4444;box-shadow:0 0 0 3px rgba(239,68,68,0.12)">
    <div class="error-msg">Quantity cannot be negative</div>
  </div>
</div>
</body>
</html>
