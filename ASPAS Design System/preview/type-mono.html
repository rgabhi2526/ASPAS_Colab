<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 20px; padding: 10px 0; border-bottom: 1px solid #F3F4F6; }
  .row:last-child { border-bottom: none; }
  .meta { min-width: 110px; font-size: 10px; font-family: 'DM Mono', monospace; color: #9CA3AF; }
</style>
</head>
<body>
<div class="row">
  <div class="meta">DM Mono / 500</div>
  <div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:500;letter-spacing:0.04em;color:#111827">SP-BRK-001</div>
  <div style="font-size:12px;color:#9CA3AF">Part number</div>
</div>
<div class="row">
  <div class="meta">DM Mono / 400</div>
  <div style="font-family:'DM Mono',monospace;font-size:13px;color:#374151;background:#F3F4F6;padding:3px 8px;border-radius:4px">₹1,200.00</div>
  <div style="font-size:12px;color:#9CA3AF">Price / quantity</div>
</div>
<div class="row">
  <div class="meta">DM Mono / 400</div>
  <div style="font-family:'DM Mono',monospace;font-size:12px;color:#6B7280">GET /api/parts/SP-ENG-001</div>
  <div style="font-size:12px;color:#9CA3AF">API endpoint ref</div>
</div>
<div class="row">
  <div class="meta">DM Mono / 500</div>
  <div style="font-family:'DM Mono',monospace;font-size:28px;font-weight:700;color:#111827">1,842</div>
  <div style="font-size:12px;color:#9CA3AF">Stat display</div>
</div>
</body>
</html>
