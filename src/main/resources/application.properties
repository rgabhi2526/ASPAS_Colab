# ==============================================================
# ASPAS Backend - Application Configuration
# ==============================================================

# ---------- SERVER ----------
server.port=8080
spring.application.name=ASPAS-Backend

# ---------- MYSQL (phpMyAdmin managed) ----------
# Database: aspas_db
# Create this database in phpMyAdmin before starting
spring.datasource.url=jdbc:mysql://localhost:3306/aspas_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / HIBERNATE ----------
# validate  = checks schema matches entities (production)
# update    = auto-alters tables to match entities (development)
# create    = drops and recreates every startup (testing only)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Run schema.sql on startup (set to always for first run, then never)
spring.sql.init.mode=never  
spring.sql.init.schema-locations=classpath:schema.sql

# ---------- MONGODB ----------
# Database: aspas_nosql
# Collection: sales_transactions
spring.data.mongodb.uri=mongodb://localhost:27017/aspas_nosql
spring.data.mongodb.auto-index-creation=true

# Calendar-day bounds for Mongo queries (empty = JVM default zone). Match the shop's locale.
aspas.business-timezone=Asia/Kolkata

# ---------- SCHEDULER ----------
# Enable @Scheduled annotations (System Clock actor)
spring.task.scheduling.pool.size=2

# ---------- SWAGGER / OPENAPI ----------
# Access at: http://localhost:8080/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ---------- LOGGING ----------
logging.level.com.aspas=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG